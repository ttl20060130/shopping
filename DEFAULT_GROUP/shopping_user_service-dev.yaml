# 端口号
server:
  port: 9006

# 日志格式
logging:
  pattern:
    console: '%d{HH:mm:ss.SSS} %clr(%-5level) ---  [%-15thread] %cyan(%-50logger{50}):%msg%n'

#配置mybatis-plus
mybatis-plus:
  global-config:
    db-config:
      # 表名前缀
      table-prefix: bz_
      # 主键生成策略为自增
      id-type: auto
  configuration:
    # 关闭列名自动驼峰命名规则映射
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl #开启sql日志

spring:
  application:
    name: shopping_user_service #服务名
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.66.100:8848 # 注册中心地址
  # 数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql:///baizhanshopping?serverTimezone=UTC
    username: root
    password: root
  # redis
  data:
    redis:
      host: 192.168.66.100
      port: 6379
      timeout: 30000
      jedis:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

dubbo:
  application:
    name: shopping_user_service # 项目名
    serialize-check-status: DISABLE
    check-serializable: false
  protocol:
    name: dubbo # 通讯协议
    port: -1 # 端口号，-1表示自动扫描可用端口。
  registry:
    address: nacos://192.168.66.100:8848 # 注册中心